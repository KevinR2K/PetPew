<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Tracking | PetPew</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep:  #2d6a4f;
      --green-mid:   #40916c;
      --green-main:  #52b788;
      --green-light: #b7e4c7;
      --green-pale:  #d8f3dc;
      --gold:        #f4a522;
      --gold-dark:   #d4880a;
      --cream:       #faf7f2;
      --charcoal:    #1e2a23;
      --text-body:   #3d4f44;
      --text-muted:  #748a7c;
      --white:       #ffffff;
      --danger:      #e63946;
      --shadow-sm:   0 2px 12px rgba(40,100,60,0.08);
      --shadow-md:   0 8px 32px rgba(40,100,60,0.13);
      --radius-sm:   8px;
      --radius-md:   16px;
      --radius-lg:   28px;
      --radius-pill: 100px;
      --transition:  all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-body);line-height:1.7;min-height:100vh;}
    a{text-decoration:none;color:inherit;}

    /* ── Announcement Bar ── */
    .announcement-bar{background:var(--green-deep);color:var(--green-pale);text-align:center;padding:9px 16px;font-size:0.82rem;font-weight:500;letter-spacing:0.04em;}
    .announcement-bar span{color:var(--gold);font-weight:700;}

    /* ── Navbar ── */
    .navbar{background:var(--white);position:sticky;top:0;z-index:1000;border-bottom:1px solid var(--green-pale);box-shadow:var(--shadow-sm);}
    .navbar-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;height:72px;gap:16px;}
    .navbar-brand{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--green-deep);letter-spacing:-0.02em;flex-shrink:0;}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--green-main),var(--green-deep));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--white);box-shadow:0 4px 12px rgba(82,183,136,0.35);}
    .brand-dot{color:var(--gold);}
    .nav-actions{display:flex;align-items:center;gap:8px;}
    .nav-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius-pill);font-size:0.88rem;font-weight:500;transition:var(--transition);cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
    .nav-btn-ghost{background:transparent;color:var(--text-body);border:1.5px solid var(--green-light);}
    .nav-btn-ghost:hover{background:var(--green-pale);color:var(--green-deep);}
    .nav-btn-primary{background:var(--green-deep);color:var(--white);box-shadow:0 4px 14px rgba(45,106,79,0.28);}
    .nav-btn-primary:hover{background:var(--green-mid);transform:translateY(-1px);}

    /* ── Page Header ── */
    .page-header{background:linear-gradient(135deg,var(--green-deep) 0%,var(--green-mid) 60%,var(--green-main) 100%);padding:48px 24px 40px;position:relative;overflow:hidden;}
    .page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 65% at 85% 50%,rgba(255,255,255,0.05) 0%,transparent 70%),radial-gradient(ellipse 35% 45% at 10% 80%,rgba(244,165,34,0.1) 0%,transparent 60%);pointer-events:none;}
    .page-header-pattern{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cellipse cx='30' cy='30' rx='8' ry='10'/%3E%3Cellipse cx='17' cy='20' rx='4' ry='5'/%3E%3Cellipse cx='43' cy='20' rx='4' ry='5'/%3E%3Cellipse cx='14' cy='36' rx='4' ry='5'/%3E%3Cellipse cx='46' cy='36' rx='4' ry='5'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
    .page-header-inner{max-width:900px;margin:0 auto;position:relative;z-index:1;}
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:rgba(255,255,255,0.55);margin-bottom:14px;}
    .breadcrumb a{color:rgba(255,255,255,0.7);transition:var(--transition);}
    .breadcrumb a:hover{color:var(--gold);}
    .breadcrumb i{font-size:0.6rem;}
    .page-header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:var(--white);padding:5px 14px;border-radius:var(--radius-pill);font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
    .page-header-badge i{color:var(--gold);}
    .page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;color:var(--white);letter-spacing:-0.02em;margin-bottom:6px;}
    .page-header h1 em{font-style:normal;color:var(--gold);}
    .page-header p{color:rgba(255,255,255,0.65);font-size:0.92rem;}

    /* ── Main content ── */
    .main-content{max-width:900px;margin:0 auto;padding:40px 24px 80px;}

    /* ── Skeleton ── */
    .skeleton-card{background:var(--white);border-radius:var(--radius-md);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:24px;}
    .sk-line{height:14px;border-radius:6px;background:linear-gradient(90deg,var(--green-pale) 25%,#eaf7ed 50%,var(--green-pale) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;margin-bottom:12px;}
    .sk-line.short{width:40%;}.sk-line.med{width:65%;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    /* ── Order Header Card ── */
    .order-header-card{
      background:var(--white);
      border-radius:var(--radius-md);
      box-shadow:var(--shadow-sm);
      border:1.5px solid transparent;
      overflow:hidden;
      margin-bottom:24px;
      transition:var(--transition);
    }
    .order-header-card:hover{border-color:var(--green-light);}

    .order-head-banner{
      background:linear-gradient(135deg,var(--green-deep),var(--green-mid));
      padding:20px 24px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    }

    .order-head-left{display:flex;align-items:center;gap:14px;}
    .order-head-icon{width:44px;height:44px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
    .order-head-id{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--white);}
    .order-head-date{font-size:0.76rem;color:rgba(255,255,255,0.62);margin-top:2px;}

    /* Status badge */
    .status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-pill);font-size:0.72rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;flex-shrink:0;}
    .status-pending   {background:#fff3cd;color:#856404;border:1.5px solid #ffc107;}
    .status-processing{background:#cff4fc;color:#055160;border:1.5px solid #0dcaf0;}
    .status-shipped   {background:#d1ecf1;color:#0c5460;border:1.5px solid #17a2b8;}
    .status-delivered {background:var(--green-pale);color:var(--green-deep);border:1.5px solid var(--green-light);}
    .status-cancelled {background:#f8d7da;color:#842029;border:1.5px solid #f5c6cb;}
    .status-default   {background:#f0f0f0;color:var(--text-muted);border:1.5px solid #ddd;}

    .order-head-body{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;}
    .meta-item label{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--green-main);display:block;margin-bottom:4px;}
    .meta-item strong{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--charcoal);}
    .meta-item span{font-size:0.85rem;color:var(--text-body);}

    /* Tracking number highlight */
    .tracking-num{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--gold-pale, #fff8e5);
      border:1.5px solid rgba(244,165,34,0.3);
      border-radius:var(--radius-sm);
      padding:8px 14px;margin-top:4px;
      font-family:monospace;font-size:0.88rem;font-weight:700;
      color:var(--charcoal);letter-spacing:0.06em;
    }

    .tracking-num i{color:var(--gold-dark,#d4880a);}

    /* Note box */
    .note-box{
      background:var(--gold-pale, #fff8e5);
      border:1.5px solid rgba(244,165,34,0.25);
      border-radius:var(--radius-sm);
      padding:12px 16px;
      margin:0 24px 20px;
      display:flex;align-items:flex-start;gap:10px;
      font-size:0.85rem;color:var(--text-body);
    }
    .note-box i{color:var(--gold-dark,#d4880a);margin-top:2px;flex-shrink:0;}

    /* ── Progress Stepper ── */
    .progress-card{
      background:var(--white);border-radius:var(--radius-md);
      box-shadow:var(--shadow-sm);border:1.5px solid transparent;
      padding:28px 24px;margin-bottom:24px;
      transition:var(--transition);
    }
    .progress-card:hover{border-color:var(--green-light);}
    .progress-card-head{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .progress-card-icon{width:36px;height:36px;background:var(--green-pale);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--green-deep);}
    .progress-card-head h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--charcoal);}

    .stepper{display:flex;align-items:flex-start;gap:0;position:relative;}
    .step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}

    .step-connector{
      position:absolute;top:18px;left:50%;width:100%;height:2px;
      background:var(--green-pale);
      z-index:0;
    }
    .step-item:last-child .step-connector{display:none;}
    .step-connector.done{background:var(--green-main);}

    .step-circle{
      width:36px;height:36px;border-radius:50%;
      border:2.5px solid var(--green-light);
      background:var(--white);
      display:flex;align-items:center;justify-content:center;
      font-size:0.85rem;color:var(--text-muted);
      position:relative;z-index:1;
      transition:var(--transition);flex-shrink:0;
    }
    .step-circle.done{background:var(--green-main);border-color:var(--green-main);color:var(--white);}
    .step-circle.active{background:var(--green-deep);border-color:var(--green-deep);color:var(--white);box-shadow:0 0 0 4px rgba(45,106,79,0.15);}
    .step-circle.cancelled{background:var(--danger);border-color:var(--danger);color:var(--white);}

    .step-label{margin-top:10px;text-align:center;}
    .step-label strong{display:block;font-size:0.78rem;font-weight:700;color:var(--charcoal);}
    .step-label span{font-size:0.7rem;color:var(--text-muted);}

    /* ── Items Card ── */
    .items-card{
      background:var(--white);border-radius:var(--radius-md);
      box-shadow:var(--shadow-sm);border:1.5px solid transparent;
      overflow:hidden;margin-bottom:24px;
      transition:var(--transition);
    }
    .items-card:hover{border-color:var(--green-light);}
    .items-card-head{padding:16px 22px 14px;border-bottom:1px solid var(--green-pale);display:flex;align-items:center;gap:10px;}
    .items-card-icon{width:36px;height:36px;background:var(--green-pale);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--green-deep);}
    .items-card-head h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--charcoal);}

    .order-item-row{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--green-pale);transition:var(--transition);}
    .order-item-row:last-child{border-bottom:none;}
    .order-item-row:hover{background:rgba(216,243,220,0.15);}

    .item-img{width:60px;height:60px;border-radius:var(--radius-sm);object-fit:contain;padding:6px;background:var(--green-pale);border:1.5px solid var(--green-pale);flex-shrink:0;}
    .item-info{flex:1;}
    .item-info strong{display:block;font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--charcoal);margin-bottom:2px;}
    .item-info span{font-size:0.78rem;color:var(--text-muted);}
    .item-price{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--green-deep);flex-shrink:0;}

    .items-footer{padding:16px 22px;background:var(--cream);border-top:1px solid var(--green-pale);display:flex;justify-content:space-between;align-items:center;}
    .items-footer span{font-size:0.85rem;color:var(--text-muted);}
    .total-amount{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--green-deep);}

    /* ── Back button ── */
    .back-btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:11px 24px;background:var(--green-deep);color:var(--white);
      border-radius:var(--radius-pill);font-weight:600;font-size:0.9rem;
      transition:var(--transition);box-shadow:0 4px 14px rgba(45,106,79,0.28);
    }
    .back-btn:hover{background:var(--green-mid);transform:translateY(-2px);}

    /* ── Error / Empty state ── */
    .state-box{background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:64px 24px;text-align:center;}
    .state-icon{font-size:3.5rem;margin-bottom:16px;opacity:0.35;}
    .state-box h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--charcoal);margin-bottom:8px;}
    .state-box p{font-size:0.9rem;color:var(--text-muted);margin-bottom:20px;}

    /* Reveal */
    .reveal{opacity:0;transform:translateY(20px);transition:opacity 0.6s ease,transform 0.6s ease;}
    .reveal.visible{opacity:1;transform:translateY(0);}

    /* Responsive */
    @media(max-width:768px){
      .navbar-inner{height:60px;padding:0 16px;}
      .navbar-brand{font-size:1.5rem;}
      .nav-btn span{display:none;}
      .stepper{flex-direction:column;gap:0;align-items:flex-start;}
      .step-item{flex-direction:row;width:100%;align-items:flex-start;gap:14px;padding-bottom:20px;}
      .step-item:last-child{padding-bottom:0;}
      .step-connector{top:18px;left:18px;width:2px;height:100%;transform:none;}
      .step-connector.done{background:var(--green-main);}
      .step-label{text-align:left;margin-top:0;}
      .order-head-body{grid-template-columns:1fr 1fr;}
    }
    @media(max-width:480px){
      .order-head-body{grid-template-columns:1fr;}
      .order-item-row{gap:10px;}
      .item-img{width:48px;height:48px;}
    }
  </style>
</head>
<body>

  <!-- Announcement Bar -->
  <div class="announcement-bar">
    🐾 Free island-wide delivery on orders over <span>Rs.5,000</span> &nbsp;|&nbsp; Use code <span>PETPEW10</span> for 10% off
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="homepage.html" class="navbar-brand">
        <div class="logo-icon">🐾</div>
        Pet<span class="brand-dot">Pew</span>
      </a>
      <div class="nav-actions">
        <a href="my_orders.html" class="nav-btn nav-btn-ghost">
          <i class="fas fa-box"></i>
          <span>My Orders</span>
        </a>
        <a href="account.php" class="nav-btn nav-btn-primary">
          <i class="fas fa-user"></i>
          <span>Account</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-pattern"></div>
    <div class="page-header-inner">
      <div class="breadcrumb">
        <a href="homepage.html">Home</a>
        <i class="fas fa-chevron-right"></i>
        <a href="my_orders.html">My Orders</a>
        <i class="fas fa-chevron-right"></i>
        <span>Track Order</span>
      </div>
      <div class="page-header-badge">
        <i class="fas fa-map-marker-alt"></i>
        Live Tracking
      </div>
      <h1>Order <em>Tracking</em></h1>
      <p id="headerOrderId">Loading your order details…</p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Skeleton shown while loading -->
    <div id="skeleton">
      <div class="skeleton-card">
        <div class="sk-line short"></div>
        <div class="sk-line med"></div>
        <div class="sk-line"></div>
        <div class="sk-line short"></div>
      </div>
      <div class="skeleton-card">
        <div class="sk-line short"></div>
        <div class="sk-line"></div>
        <div class="sk-line med"></div>
      </div>
    </div>
    <!-- Actual content injected here -->
    <div id="wrap"></div>
  </main>

  <script>
    // ── Status config ──────────────────────────────────────────
    const statusConfig = {
      'pending':    { cls:'status-pending',    icon:'fas fa-clock',          label:'Pending' },
      'processing': { cls:'status-processing', icon:'fas fa-cog fa-spin',    label:'Processing' },
      'shipped':    { cls:'status-shipped',    icon:'fas fa-shipping-fast',  label:'Shipped' },
      'delivered':  { cls:'status-delivered',  icon:'fas fa-check-circle',   label:'Delivered' },
      'cancelled':  { cls:'status-cancelled',  icon:'fas fa-times-circle',   label:'Cancelled' },
    };

    function getStatus(s) {
      return statusConfig[(s||'').toLowerCase()] || { cls:'status-default', icon:'fas fa-circle', label: s || 'Unknown' };
    }

    // Steps in order
    const STEPS = [
      { key: 'pending',    label: 'Order Placed',  sub: 'Awaiting confirmation', icon: 'fas fa-clock' },
      { key: 'processing', label: 'Processing',    sub: 'Being prepared',        icon: 'fas fa-cog'   },
      { key: 'shipped',    label: 'Shipped',        sub: 'On its way to you',     icon: 'fas fa-truck' },
      { key: 'delivered',  label: 'Delivered',      sub: 'Order complete',        icon: 'fas fa-home'  },
    ];

    const STEP_ORDER = { pending: 0, processing: 1, shipped: 2, delivered: 3 };

    function buildStepper(currentStatus) {
      const statusKey  = (currentStatus || '').toLowerCase();
      const isCancelled = statusKey === 'cancelled';
      const currentIdx  = STEP_ORDER[statusKey] ?? -1;

      return STEPS.map((step, i) => {
        const done   = !isCancelled && i < currentIdx;
        const active = !isCancelled && i === currentIdx;
        const cancel = isCancelled && i === 0; // mark first step as cancelled

        let circleClass = done ? 'done' : (active ? 'active' : (cancel ? 'cancelled' : ''));
        let circleContent = done
          ? '<i class="fas fa-check"></i>'
          : (active || cancel ? `<i class="${step.icon}"></i>` : (i + 1));

        const connectorClass = done ? 'done' : '';

        return `
          <div class="step-item">
            <div class="step-circle ${circleClass}">${circleContent}</div>
            <div class="step-connector ${connectorClass}"></div>
            <div class="step-label">
              <strong>${step.label}</strong>
              <span>${active ? '<strong style="color:var(--green-deep)">' + (isCancelled ? 'Cancelled' : step.sub) + '</strong>' : step.sub}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── Main render ──────────────────────────────────────────
    function renderOrder(o) {
      const sc       = getStatus(o.status);
      const date     = new Date(o.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
      const time     = new Date(o.created_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const items    = o.items || [];
      const total    = parseFloat(o.total_amount || 0).toFixed(2);

      // Update header subtitle
      document.getElementById('headerOrderId').textContent = `Order #${o.id} · Placed ${date}`;

      const trackingBlock = o.tracking_number ? `
        <div class="meta-item" style="grid-column:1/-1;">
          <label>Tracking Number</label>
          <div class="tracking-num">
            <i class="fas fa-barcode"></i>
            ${o.tracking_number}
          </div>
        </div>` : '';

      const noteBlock = o.tracking_note ? `
        <div class="note-box">
          <i class="fas fa-sticky-note"></i>
          <span><strong>Note:</strong> ${o.tracking_note}</span>
        </div>` : '';

      const itemRows = items.map(item => `
        <div class="order-item-row">
          <img class="item-img"
               src="${item.image || ''}"
               alt="${item.name}"
               onerror="this.src='https://placehold.co/60x60/d8f3dc/2d6a4f?text=🐾'">
          <div class="item-info">
            <strong>${item.name}</strong>
            <span>Qty: ${item.quantity} &nbsp;·&nbsp; Rs. ${parseFloat(item.price).toFixed(2)} each</span>
          </div>
          <span class="item-price">Rs. ${(parseFloat(item.price) * item.quantity).toFixed(2)}</span>
        </div>`).join('');

      document.getElementById('wrap').innerHTML = `

        <!-- Order Header Card -->
        <div class="order-header-card reveal">
          <div class="order-head-banner">
            <div class="order-head-left">
              <div class="order-head-icon"><i class="fas fa-box-open"></i></div>
              <div>
                <div class="order-head-id">Order #${o.id}</div>
                <div class="order-head-date">${date} at ${time}</div>
              </div>
            </div>
            <span class="status-badge ${sc.cls}">
              <i class="${sc.icon}"></i> ${sc.label}
            </span>
          </div>

          <div class="order-head-body">
            <div class="meta-item">
              <label>Order Total</label>
              <strong>Rs. ${total}</strong>
            </div>
            <div class="meta-item">
              <label>Items</label>
              <span>${items.length} item${items.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="meta-item">
              <label>Payment</label>
              <span>${o.payment_method || 'Online'}</span>
            </div>
            ${trackingBlock}
          </div>

          ${noteBlock}
        </div>

        <!-- Tracking Progress -->
        <div class="progress-card reveal">
          <div class="progress-card-head">
            <div class="progress-card-icon"><i class="fas fa-route"></i></div>
            <h3>Delivery Progress</h3>
          </div>
          <div class="stepper">
            ${buildStepper(o.status)}
          </div>
        </div>

        <!-- Items -->
        <div class="items-card reveal">
          <div class="items-card-head">
            <div class="items-card-icon"><i class="fas fa-shopping-bag"></i></div>
            <h3>Order Items</h3>
          </div>
          ${itemRows}
          <div class="items-footer">
            <span>${items.length} item${items.length !== 1 ? 's' : ''} ordered</span>
            <div>
              <span style="font-size:0.82rem;color:var(--text-muted);margin-right:10px;">Grand Total</span>
              <span class="total-amount">Rs. ${total}</span>
            </div>
          </div>
        </div>

        <!-- Back button -->
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <a href="my_orders.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to My Orders
          </a>
          <a href="shopnow.html" class="back-btn" style="background:transparent;color:var(--green-deep);border:1.5px solid var(--green-light);box-shadow:none;">
            <i class="fas fa-store"></i> Continue Shopping
          </a>
        </div>
      `;

      // Animate cards in
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((e, i) => {
          if (e.isIntersecting) {
            setTimeout(() => e.target.classList.add('visible'), i * 100);
            observer.unobserve(e.target);
          }
        });
      }, { threshold: 0.08 });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    // ── Fetch ────────────────────────────────────────────────
    const id = new URLSearchParams(location.search).get('id');

    if (!id) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('headerOrderId').textContent = 'No order ID provided.';
      document.getElementById('wrap').innerHTML = `
        <div class="state-box">
          <div class="state-icon">📦</div>
          <h3>No Order ID</h3>
          <p>Please navigate here from your orders list.</p>
          <a href="my_orders.html" class="back-btn">
            <i class="fas fa-box"></i> View My Orders
          </a>
        </div>`;
    } else {
      fetch(`/api/get_order.php?id=${encodeURIComponent(id)}`)
        .then(r => r.ok ? r.json() : r.json().then(e => { throw new Error(e.error || 'Failed to load order'); }))
        .then(o => {
          document.getElementById('skeleton').style.display = 'none';
          renderOrder(o);
        })
        .catch(err => {
          document.getElementById('skeleton').style.display = 'none';
          document.getElementById('headerOrderId').textContent = 'Could not load order.';
          document.getElementById('wrap').innerHTML = `
            <div class="state-box">
              <div class="state-icon">⚠️</div>
              <h3>Order Not Found</h3>
              <p>${err.message || 'Please check the order ID and try again.'}</p>
              <a href="my_orders.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to My Orders
              </a>
            </div>`;
        });
    }
  </script>
</body>
</html>
